# Any child under "commands" becomes a dynamic command registered at runtime.
# message: accepts either strings (legacy [Display|Commands|Hover] syntax) or structured
#          segments built from "text" and "button" entries.
# Button fields:
#   text        -> label shown in chat
#   hover       -> tooltip (string or list of strings)
#   commands    -> string or list (supports ; to chain actions)
#   run-as      -> player | console | proxy-player | proxy-console (defaults to console)
#   context     -> viewer | target   (PlaceholderAPI render context)
#   append-space -> add a trailing space after the button (default false)
#   permission  -> optional node required to show this entry (lines/message items accept this too)
# Placeholders:
#   %player% -> viewer name
#   %target% -> selected target (self menus fall back to the viewer)
#   %context% (alias: %reason%, %content%) -> extra text passed after the command (e.g. reason)

commands:

  prefix:
    permission: chatmenu.prefix
    type: self
    message:
      - text: "&fPick your Name Color and Prefix:"
      - line:
          - text: "&fColor: "
          - button:
              text: "&2Dark Green"
              hover: "&aSelect Dark Green"
              commands:
                - "lp user %player% meta removeprefix 2"
                - "lp user %player% meta addprefix 2 &2"
                - "msg %player% &aSetting updated"
          - text: ", "
          - button:
              text: "&aGreen"
              hover: "&aSelect Green"
              commands:
                - "lp user %player% meta removeprefix 2"
                - "lp user %player% meta addprefix 2 &a"
                - "msg %player% &aSetting updated"
          - text: ", "
          - button:
              text: "&eYellow"
              hover: "&aSelect Yellow"
              commands:
                - "lp user %player% meta removeprefix 2"
                - "lp user %player% meta addprefix 2 &e"
                - "msg %player% &aSetting updated"
          - text: ", "
          - button:
              text: "&6Orange"
              hover: "&aSelect Orange"
              commands:
                - "lp user %player% meta removeprefix 2"
                - "lp user %player% meta addprefix 2 &6"
                - "msg %player% &aSetting updated"
          - text: ", "
          - button:
              text: "&cRed"
              hover: "&aSelect Red"
              commands:
                - "lp user %player% meta removeprefix 2"
                - "lp user %player% meta addprefix 2 &c"
                - "msg %player% &aSetting updated"
          - text: ", "
          - button:
              text: "&9Blue"
              hover: "&aSelect Blue"
              commands:
                - "lp user %player% meta removeprefix 2"
                - "lp user %player% meta addprefix 2 &9"
                - "msg %player% &aSetting updated"
          - text: ", "
          - button:
              text: "&5Purple"
              hover: "&aSelect Purple"
              commands:
                - "lp user %player% meta removeprefix 2"
                - "lp user %player% meta addprefix 2 &5"
                - "msg %player% &aSetting updated"
      - ""
      - line:
          - text: "&fPrefix: "
          - button:
              text: "&d✿"
              hover: "&dBloom with this symbol"
              commands:
                - "lp user %player% meta removeprefix 3"
                - "lp user %player% meta addprefix 3 \"&d✿ &r\""
                - "msg %player% &aSetting updated"
          - text: ", "
          - button:
              text: "&c❤"
              hover: "&cShow your love"
              commands:
                - "lp user %player% meta removeprefix 3"
                - "lp user %player% meta addprefix 3 \"&c❤ &r\""
                - "msg %player% &aSetting updated"
          - text: ", "
          - button:
              text: "&f♬"
              hover: "&fMusical vibes"
              commands:
                - "lp user %player% meta removeprefix 3"
                - "lp user %player% meta addprefix 3 \"&f♬ &r\""
                - "msg %player% &aSetting updated"
          - text: ", "
          - button:
              text: "&e✦"
              hover: "&eShine bright"
              commands:
                - "lp user %player% meta removeprefix 3"
                - "lp user %player% meta addprefix 3 \"&e✦ &r\""
                - "msg %player% &aSetting updated"
          - text: ", "
          - button:
              text: "&6✯"
              hover: "&6Add sparkle"
              commands:
                - "lp user %player% meta removeprefix 3"
                - "lp user %player% meta addprefix 3 \"&6✯ &r\""
                - "msg %player% &aSetting updated"
          - text: ", "
          - button:
              text: "&9☄"
              hover: "&9Cosmic style"
              commands:
                - "lp user %player% meta removeprefix 3"
                - "lp user %player% meta addprefix 3 \"&9☄ &r\""
                - "msg %player% &aSetting updated"
          - text: ", "
          - button:
              text: "&a☀"
              hover: "&aSunny mood"
              commands:
                - "lp user %player% meta removeprefix 3"
                - "lp user %player% meta addprefix 3 \"&a☀ &r\""
                - "msg %player% &aSetting updated"
      - line:
          - button:
              text: "&cReset Color and Prefix"
              hover: "&cRemove all selections"
              commands:
                - "lp user %player% meta removeprefix 2"
                - "lp user %player% meta removeprefix 3"
                - "msg %player% &aSelections cleared"

  punish:
    permission: chatmenu.punish
    type: target
    message:
      - text: '&eTargeting: &c%target%&e in group(s): &e%luckperms_inherited_groups%'
        context: target
      - text: ''
      - line:
          - button:
              text: '&e[Send Warning] '
              hover: '&eSend a warning to %target%'
              commands:
                - 'warn %target% %context%'
          - button:
              text: '&e[Kick] '
              hover: '&eKick %target%'
              commands:
                - 'kick %target% %context%'
      - text: ''
      - line:
          - button:
              text: '&6[Mute] '
              hover: '&6Mute %target% for 1 hour'
              commands:
                - 'mute %target% 1h %context%'
          - button:
              text: '&c[Ban] '
              hover: '&cBan %target% for 1 hour'
              commands:
                - 'ban %target% 1h %context%'
          - button:
              text: '&4[IP-Ban] '
              hover: '&4IP-Ban %target% for 1 hour'
              commands:
                - 'banip %target% 1h %context%'
          - text: ' (1 Hour)'
      - text: ''
      - line:
          - button:
              text: '&6[Mute] '
              hover: '&6Mute %target% for 1 day'
              commands:
                - 'mute %target% 1d %context%'
          - button:
              text: '&c[Ban] '
              hover: '&cBan %target% for 1 day'
              commands:
                - 'ban %target% 1d %context%'
          - button:
              text: '&4[IP-Ban] '
              hover: '&4IP-Ban %target% for 1 day'
              commands:
                - 'banip %target% 1d %context%'
          - text: ' (1 Day)'
      - text: ''
      - line:
          - button:
              text: '&6[Mute] '
              hover: '&6Mute %target% for 1 week'
              commands:
                - 'mute %target% 1w %context%'
          - button:
              text: '&c[Ban] '
              hover: '&cBan %target% for 1 week'
              commands:
                - 'ban %target% 1w %context%'
          - button:
              text: '&4[IP-Ban] '
              hover: '&4IP-Ban %target% for 1 week'
              commands:
                - 'banip %target% 1w %context%'
          - text: ' (1 Week)'
      - text: ''
      - line:
          - button:
              text: '&6[Mute] '
              hover: '&6Mute %target% permanently'
              commands:
                - 'mute %target% %context%'
          - button:
              text: '&c[Ban] '
              hover: '&cBan %target% permanently'
              commands:
                - 'ban %target% %context%'
          - button:
              text: '&4[IP-Ban] '
              hover: '&4IP-Ban %target% permanently'
              commands:
                - 'banip %target% %context%'
          - text: ' (Permanent)'
      - text: ''
      - line:
          - button:
              text: '&e[Info] '
              hover: '&eView info on %target%'
              commands:
                - 'player:/whois %target%'
          - button:
              text: '&e[Banlist] '
              hover: '&eView banlist'
              commands:
                - 'player:/banlist'
          - button:
              text: '&e[Un-Mute] '
              hover: '&eUn-Mute %target%'
              commands:
                - 'mute %target%'
          - button:
              text: '&e[Un-Ban] '
              hover: '&eUn-Ban %target%'
              commands:
                - 'pardon %target%'
          - button:
              text: '&e[Un-IP-Ban] '
              hover: '&eUn-IP-Ban %target%'
              commands:
                - 'pardonip %target%'
      - line:
          - button:
              text: '&e[Vanish & TP] '
              hover: '&eVanish and teleport to %target%'
              commands:
                - 'v %player%'
                - 'tp %player% %target%'
          - button:
              text: '&e[Check Alts] '
              hover: '&eCheck alts of %target%'
              commands:
                - 'player:/alts %target%'
          - button:
              text: '&e[View Inventory] '
              hover: '&eView inventory of %target%'
              commands:
                - 'player:/invsee %target%'
          - button:
              text: '&e[View Enderchest] '
              hover: '&eView enderchest of %target%'
              commands:
                - 'player:/ec %target%'
